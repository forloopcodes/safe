name: build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  release:
    types: [published]

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
      fail-fast: false

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo build --release

      - name: upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: safe-${{ runner.os == 'Windows' && 'windows' || 'linux' }}
          path: ${{ runner.os == 'Windows' && 'target/release/safe.exe' || 'target/release/safe' }}
